    async function fetchWolframAlphaData(query, relevantKeywords) {
        const url = `http://localhost:3000/wolfram?q=${encodeURIComponent(query)}`;

    
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        const data = await response.json();
    
        if (data.queryresult && data.queryresult.success && data.queryresult.pods) {
            let relevantPod = null;
    
            // Look for the most relevant pod based on the keywords provided
            for (const pod of data.queryresult.pods) {
                if (isRelevantPod(pod, relevantKeywords)) {
                    relevantPod = pod;
                    break; // Stop once we find the first relevant pod
                }
            }
    
            if (relevantPod && relevantPod.subpods && relevantPod.subpods.length > 0) {
                const content = relevantPod.subpods[0].plaintext || 'No data available';
    
                // Ensure the content is not just reiterating the query
                if (!content.toLowerCase().includes(query.toLowerCase())) {
                    return content;
                }
            }
        }
        return 'No data available';
    }
    
    function isRelevantPod(pod, relevantKeywords) {
        // Determine if the pod's title or content matches the relevant keywords
        return relevantKeywords.some(keyword => pod.title.toLowerCase().includes(keyword));

        function clear() {

        function geocode(request, markertouse) {
            clear();
            geocoder
                .geocode(request)
                .then((result) => {
                    const { results } = result;
                    map.setCenter(results[0].geometry.location);
                    markertouse.setPosition(results[0].geometry.location);

        function sleep(ms) {

        function haversine_distance(lat1, long1, lat2, long2) {
            var R = 3958.8; // Radius of the Earth in miles
            var rlat1 = lat1 * (Math.PI / 180); // Convert degrees to radians
            var rlat2 = lat2 * (Math.PI / 180); // Convert degrees to radians
            var difflat = rlat2 - rlat1; // Radian difference (latitudes)
            var difflon = (long2 - long1) * (Math.PI / 180); // Radian difference (longitudes)
            var d = 2 * R * Math.asin(Math.sqrt(Math.sin(difflat / 2) * Math.sin(difflat / 2) + Math.cos(rlat1) * Math.cos(rlat2) * Math.sin(difflon / 2) * Math.sin(difflon / 2)));
            return d;
        }
    }

                    cityname.innerText = "City: " + city;
                    
                        // Asynchronous function to fetch and display city information
                        async function getCityInfo() {
                            if (!city) {
                                alert('Could not get city information');
                                return;
                            }
                    
                            const resultDiv = document.getElementById('result');
                            resultDiv.innerHTML = 'Loading...';
                    
                            try {
                                const population = await fetchWolframAlphaData(`population of ${city}, ${country}`, ["population", "result", "value", "answer"]);
                                const nearbycities = await fetchWolframAlphaData(`nearby cities of ${city}, ${country}`, ["nearby cities", "result", "value", "answer"]);
                                const localTime = await fetchWolframAlphaData(`current local time in ${city}, ${country}`, ["current local time", "result", "value", "answer"])
                    
                                // Display the fetched information
                                displayCityInfo(city, population, nearbycities, localTime);
                            } catch (error) {
                                console.error('Error:', error);
                                resultDiv.innerHTML = 'There was an error fetching the data.';
                            }
                        }
                    
                        // Function to fetch data from Wolfram Alpha and return the most relevant pod
                        async function fetchWolframAlphaData(query, relevantKeywords) {
                            const url = `http://localhost:3000/wolfram?q=${encodeURIComponent(query)}`;

                    
                            const response = await fetch(url);
                            if (!response.ok) {
                                throw new Error('Network response was not ok');
                            }
                            const data = await response.json();
                    
                            if (data.queryresult && data.queryresult.success && data.queryresult.pods) {
                                let relevantPod = null;
                    
                                // Look for the most relevant pod based on the keywords provided
                                for (const pod of data.queryresult.pods) {
                                    if (isRelevantPod(pod, relevantKeywords)) {
                                        relevantPod = pod;
                                        break; // Stop once we find the first relevant pod
                                    }
                                }
                    
                                if (relevantPod && relevantPod.subpods && relevantPod.subpods.length > 0) {
                                    const content = relevantPod.subpods[0].plaintext || 'No data available';
                    
                                    // Ensure the content is not just reiterating the query
                                    if (!content.toLowerCase().includes(query.toLowerCase())) {
                                        return content;
                                    }
                                }
                            }
                            return 'No data available';
                        }
                    
                        // Function to check if a pod matches the relevant keywords
                        function isRelevantPod(pod, relevantKeywords) {
                            // Determine if the pod's title or content matches the relevant keywords
                            return relevantKeywords.some(keyword => pod.title.toLowerCase().includes(keyword));
                        }
                    
                        // Function to display the city information
                        function displayCityInfo(city, population, nearbycities, localTime) {
                            const resultDiv = document.getElementById('result');
                            //console.log(city, population, nearbycities, localTime);
                        
                            // Format the nearby cities information
                            const formattedNearbyCities = nearbycities
                                .split('\n')
                                .map(line => line.replace(/ \| /g, '--'))
                                .join('<br>');
                        
                            resultDiv.innerHTML = `
                                <h2>Information for ${city}</h2>
                                <p><strong>Population:</strong> ${population}</p>
                                <p><strong>Nearby Cities:</strong><br>${formattedNearbyCities}</p>
                                <p><strong>Local Time:</strong> ${localTime}</p>
                            `;
                        }
                        
                    
                        // Call getCityInfo to fetch and display city info
                        getCityInfo();

                    giveupbutton.style.display = "none";

                    const yes = document.createElement("button");
                    yes.innerText = "Start Over";

                    yes.style.position = "absolute";
                    yes.style.right = "10px";
                    yes.style.top = "0px"; // Adjust the vertical position as needed

                    submitguessButton.style.visibility = "hidden";

                    yes.addEventListener("click", () => {
                        location.reload();
                    });

    
                    document.getElementById("inputPanel").appendChild(yes);
                }
    
                if (!verifiedcountry && !dontadd) {
               
                    const movingcountry = country.charAt(positionofindex);
                    characters.push(movingcountry);

                    // console.log(charactersLabel);

                        verifiedcountry = true;
                        characters = [];

                    if (characters.length === country.length) {
                  
                        instructionLabel.innerText = "This is all of the characters!";
                        dontadd = true;
                    }
                }
    
                if (verifiedcountry && !verifiedprovice && !dontadd) {
                 
                    const movingprovince = province.charAt(positionofindex);
                    characters.push(movingprovince);
    
                    charactersLabel.innerText = "Characters: " + characters.join(", ");


                
             
    
                    if (hasprovince && verifiedcountry) {
                        verifiedprovice = true;
                        characters = [];
                    }
    
                    if (characters.length === province.length) {
                        instructionLabel.innerText = "This is all of the characters!";
                        dontadd = true;
                    }
                }
    
                if (verifiedcountry && verifiedprovice && !verifiedcity && !dontadd) {
                    const movingcity = city.charAt(positionofindex);
                    characters.push(movingcity);
                  
    
                    charactersLabel.innerText = "Characters: " + characters.join(", ");


    
    
                    if (hascity && verifiedprovice) {
                        verifiedcity = true;
                        characters = [];
                    }
    
                    if (characters.length === city.length) {
                      instructionLabel.innerText = "This is all of the characters!";
                        dontadd = true;
                    }
                }
    
                    if (!verifiedcountry && !verifiedprovice && !verifiedcity && !dontadd) {
                        instructionLabel.innerText = ("Sorry, that was not the right answer!")
                    }
                      
}

                    positionofindex++;
            
}
